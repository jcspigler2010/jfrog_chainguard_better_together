# NGINX config for the frontend pod.
# Serves the Vite-built SPA and reverse-proxies /api + /healthz to the
# FastAPI service (Kubernetes DNS name: catalog-api).

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Chainguard nginx image has no writable /var/{cache,run}; keep everything in /tmp
  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  sendfile on;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  upstream catalog_api {
    server catalog-api:8000;
  }

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /healthz { proxy_pass http://catalog_api; }
    location /api/    { proxy_pass http://catalog_api; }

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
